  window.addEventListener("error", function (e) {

// --- 3. 認証 & 家族ID管理 ---
function App() {
  const [user, setUser] = useState(null);
  const [familyId, setFamilyId] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    return auth.onAuthStateChanged(async (u) => {
      if (u) {
        setUser(u);
        const snap = await db.ref(`users/${u.uid}/familyId`).get();
        if (snap.exists()) setFamilyId(snap.val());
      } else {
        setUser(null); setFamilyId(null);
      }
      setLoading(false);
    });
  }, []);

  const login = () => {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(() => auth.signInWithRedirect(provider));
  };

  const createFamily = async () => {
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; let newId = "";
    for (let i = 0; i < 6; i++) { newId += chars.charAt(Math.floor(Math.random() * chars.length)); }
    await db.ref(`users/${user.uid}/familyId`).set(newId);
    setFamilyId(newId);
  };

  const joinFamily = async (id) => {
    if (!id) return;
    const cleanId = id.trim().toUpperCase();
    await db.ref(`users/${user.uid}/familyId`).set(cleanId);
    setFamilyId(cleanId);
  };

  const resetFamilyId = async () => {
    if (!user) return;
    if (confirm("本当にこの家族グループを抜けますか？\n（献立データは削除されませんが、招待コードを入力し直す画面に戻ります）")) {
      await db.ref(`users/${user.uid}/familyId`).remove();
      setFamilyId(null);
    }
  };

  if (loading) {
    return (
      <div style={{ ...styles.app, alignItems: "center", justifyContent: "center", display: "flex", height: "100vh" }}>
        <Loader2 className="spin" size={28} color={C.mustard} />
      </div>
    );
  }

  if (!user) {
    return (
      <div className="auth-screen">
        <h1 style={{ color: '#FF7A1A', marginBottom: '10px' }}>家族のこんだて</h1>
        <p style={{ fontSize: '14px', color: '#9C897A', marginBottom: '30px' }}>家族共有のためにログインしてください</p>
        <button className="auth-btn auth-btn-primary" onClick={login}>Googleでログイン</button>
      </div>
    );
  }

  if (!familyId) {
    return <FamilySetup onCreate={createFamily} onJoin={joinFamily} onLogout={() => auth.signOut()} />;
  }

  return <MealPlanner familyId={familyId} user={user} onLogout={() => auth.signOut()} onResetFamily={resetFamilyId} />;
}

      <button className="auth-btn auth-btn-primary" onClick={onCreate}>新しく家族グループを作る</button>
      <div style={{ margin: '20px 0', color: '#9C897A', fontSize: '14px' }}>または</div>
      <p style={{ fontSize: '14px', marginBottom: '10px' }}>招待コードを入力して参加する：</p>
      <input className="auth-input" placeholder="例: AB123XYZ" value={input} onChange={e => setInput(e.target.value)} />
      <button className="auth-btn auth-btn-outline" onClick={() => onJoin(input)}>グループに参加</button>

      skipNextSave.current = true;
      setRecipes(data.recipes?.length ? data.recipes.map(r => ({ ...r, ingredients: r.ingredients || [] })) : SAMPLE_RECIPES);
      setPlanByWeek(data.planByWeek || {});
      setExtraItems(data.extraItems || []);
      setChecked(data.checked || {});
      if (data.aiSettings) setAiSettings(data.aiSettings);
      setLoaded(true);
    });
    return () => dbRef.off("value", listener);
  }, [familyId]);

  useEffect(() => {
    if (!loaded) return;
    if (skipNextSave.current) { skipNextSave.current = false; return; }
    setSaving(true);
    const t = setTimeout(() => {
      db.ref(`families/${familyId}/mealplan`).set({ recipes, planByWeek, extraItems, checked, aiSettings })
        .catch(e => console.error("save failed", e)).finally(() => setSaving(false));
    }, 800);
    return () => clearTimeout(t);
  }, [recipes, planByWeek, extraItems, checked, loaded, familyId, aiSettings]);

  const recipeMap = useMemo(() => { const m = {}; recipes.forEach(r => m[r.id] = r); return m; }, [recipes]);
  const shoppingList = useMemo(() => {
    const agg = {};
    DAYS.forEach(d => {
      SLOTS.forEach(s => {
        const rid = week[d]?.[s.key]; if (!rid || !recipeMap[rid]) return;
        recipeMap[rid].ingredients?.forEach(ing => {
          const key = ing.name.trim(); if (!agg[key]) agg[key] = [];
          if (ing.amount) agg[key].push(ing.amount);
        });
      });
    });
    return Object.entries(agg).map(([name, amounts]) => ({ name, amounts, category: categorize(name) }));
  }, [week, recipeMap]);

  function assignSlot(wk, day, slotKey, recipeId) {
    setPlanByWeek(pbw => {
      const w = pbw[wk] || emptyWeek();
      return { ...pbw, [wk]: { ...w, [day]: { ...w[day], [slotKey]: recipeId } } };
    });
    setPickerFor(null);
  }
  function clearSlot(wk, day, slotKey) {
    setPlanByWeek(pbw => {
      const w = pbw[wk] || emptyWeek();
      return { ...pbw, [wk]: { ...w, [day]: { ...w[day], [slotKey]: null } } };
    });
  }
  function bulkImportRecipes(text) {
    const names = text.split(/[\n,、]/).map(s => s.trim()).filter(Boolean);
    const existing = new Set(recipes.map(r => r.name)); const toAdd = [];
    names.forEach(name => { if (!existing.has(name)) { existing.add(name); toAdd.push({ id: uid(), name, ingredients: [] }); } });
    if (toAdd.length) setRecipes(rs => [...rs, ...toAdd]);
    setImportOpen(false);
  }
  function mergePhotoRecipes(extracted) {
    const existing = new Set(recipes.map(r => r.name)); const toAdd = [];
    extracted.forEach(r => {
      const name = (r.name || "").trim(); if (!name || existing.has(name)) return;
      existing.add(name);
      const ingredients = Array.isArray(r.ingredients) ? r.ingredients.map(i => ({ id: uid(), name: (i.name || "").trim(), amount: (i.amount || "").trim() })).filter(i => i.name) : [];
      toAdd.push({ id: uid(), name, ingredients });
    });
    if (toAdd.length) setRecipes(rs => [...rs, ...toAdd]);
    return toAdd.length;
  }
  function saveRecipe(form) {
    if (!form.name.trim()) return;
    const cleanIngs = form.ingredients.filter(i => i.name.trim());
    if (form.id) {
      setRecipes(rs => rs.map(r => r.id === form.id ? { ...form, ingredients: cleanIngs } : r));
    } else {
      setRecipes(rs => [...rs, { id: uid(), name: form.name.trim(), ingredients: cleanIngs, category: form.category || null }]);
    }
    setRecipeForm(null);
  }
  function deleteRecipe(id) {
    setRecipes(rs => rs.filter(r => r.id !== id));
    setPlanByWeek(pbw => {
      const next = {};
      Object.entries(pbw).forEach(([wk, w]) => {
        const nw = { ...w };
        DAYS.forEach(d => {
          SLOTS.forEach(s => { if (nw[d]?.[s.key] === id) nw[d] = { ...nw[d], [s.key]: null }; });
        });
        next[wk] = nw;
      });
      return next;
    });
  }
  function toggleCheck(key) { setChecked(c => { const n = { ...c }; if (n[key]) delete n[key]; else n[key] = Date.now(); return n; }); }
  function addExtra() { if (!newExtra.trim()) return; setExtraItems(items => [...items, { id: uid(), text: newExtra.trim(), category: categorize(newExtra) }]); setNewExtra(""); }
  const addExtraFromAI = (text) => { if (text.trim()) setExtraItems(items => [...items, { id: uid(), text: text.trim(), category: categorize(text) }]); };
  function removeExtra(id) { setExtraItems(items => items.filter(i => i.id !== id)); }

  useEffect(() => {
    if (!loaded) return;
    const ONE_DAY = 24 * 60 * 60 * 1e3;
    function cleanup() {
      const now = Date.now();
      setChecked(c => {
        let changed = false; const next = { ...c };
        Object.keys(next).forEach(k => { if (typeof next[k] === "number" && now - next[k] > ONE_DAY) { delete next[k]; changed = true; } });
        return changed ? next : c;
      });
      setExtraItems(items => items.filter(item => { const ts = checked[safeCheckKey(item.text.trim())]; return !(typeof ts === "number" && now - ts > ONE_DAY); }));
    }
    cleanup(); const timer = setInterval(cleanup, 60 * 60 * 1e3); return () => clearInterval(timer);
  }, [loaded, checked]);

  return (
    <div style={styles.app}>
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <style>{FONT_IMPORT}</style>
      <Header familyId={familyId} saving={saving} onLogout={onLogout} onResetFamily={onResetFamily} />
      <div className="app-body">
        {tab === "plan" && <PlanView planByWeek={planByWeek} todayWeekStart={todayWeekStart} recipeMap={recipeMap} onPick={setPickerFor} onClear={clearSlot} />}
        {tab === "recipes" && <RecipesView recipes={recipes} onEdit={r => setRecipeForm({ category: null, ...r })} onNew={() => setRecipeForm({ id: null, name: "", category: null, ingredients: [{ id: uid(), name: "", amount: "" }] })} onImport={() => setImportOpen(true)} onPhotoImport={() => setPhotoImportOpen(true)} onUrlImport={() => setUrlImportOpen(true)} />}
        {tab === "shopping" && <ShoppingView list={shoppingList} extraItems={extraItems} checked={checked} onToggle={toggleCheck} newExtra={newExtra} setNewExtra={setNewExtra} onAddExtra={addExtra} onRemoveExtra={removeExtra} />}
        {tab === "ai" && <AIView recipes={recipes} setRecipes={setRecipes} planByWeek={planByWeek} setPlanByWeek={setPlanByWeek} weekKey={weekKey} onAddExtra={addExtraFromAI} aiSettings={aiSettings} setAiSettings={setAiSettings} />}
      </div>
      {pickerFor && <RecipePickerModal recipes={recipes} onPick={rid => assignSlot(pickerFor.wk, pickerFor.day, pickerFor.slot, rid)} onClose={() => setPickerFor(null)} />}
      {recipeForm && <RecipeFormModal form={recipeForm} onChange={setRecipeForm} onSave={saveRecipe} onClose={() => setRecipeForm(null)} onDelete={recipeForm.id ? () => { deleteRecipe(recipeForm.id); setRecipeForm(null); } : null} />}
      {importOpen && <ImportModal onImport={bulkImportRecipes} onClose={() => setImportOpen(false)} />}
      {photoImportOpen && <PhotoImportModal onMerge={mergePhotoRecipes} onClose={() => setPhotoImportOpen(false)} />}
      {urlImportOpen && <UrlImportModal onMerge={mergePhotoRecipes} onClose={() => setUrlImportOpen(false)} />}
      <BottomNav tab={tab} setTab={setTab} />
    </div>
  );
}

// --- プラン表示 & 週ブロック ---
function PlanView({ planByWeek, todayWeekStart, recipeMap, onPick, onClear }) {
  const [weeksCount, setWeeksCount] = useState(4); const sentinelRef = useRef(null);
  useEffect(() => {
    const el = sentinelRef.current; if (!el || typeof IntersectionObserver === "undefined") return;
    const obs = new IntersectionObserver((entries) => { if (entries[0].isIntersecting) setWeeksCount((c) => c + 4); }, { rootMargin: "800px 0px" });
    obs.observe(el); return () => obs.disconnect();
  }, []);
  const weekStarts = useMemo(() => Array.from({ length: weeksCount }, (_, wi) => addDays(todayWeekStart, wi * 7)), [weeksCount, todayWeekStart]);
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
      {weekStarts.map((weekStart, wi) => <WeekBlock key={toISODate(weekStart)} weekStart={weekStart} isFirst={wi === 0} plan={planByWeek[toISODate(weekStart)] || emptyWeek()} recipeMap={recipeMap} onPick={onPick} onClear={onClear} />)}
      <div ref={sentinelRef} style={{ height: 1 }} />
      <div style={{ textAlign: "center", color: C.muted, fontSize: 12, padding: "8px 0 20px" }}>下にスクロールすると続きの週が表示されます</div>
    </div>
  );
}

function WeekBlock({ weekStart, isFirst, plan, recipeMap, onPick, onClear }) {
  const wk = toISODate(weekStart); const todayISO = toISODate(new Date()); const weekEnd = addDays(weekStart, 6);
  const rangeLabel = `${weekStart.getFullYear()}年 ${formatMonthDay(weekStart)} 〜 ${formatMonthDay(weekEnd)}`;
  return (
    <div>
      <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 12, color: isFirst ? C.mustard : C.muted, padding: "10px 2px 8px" }}>{isFirst && "今週 ・ "}{rangeLabel}</div>
      <div className="week-container">
        <div style={{ display: "flex", borderBottom: `1px solid ${C.line}`, background: "#FFF1E2" }}>
          <div style={{ width: 34, flexShrink: 0 }} />
          {SLOTS.map((slot) => <div key={slot.key} style={{ flex: 1, textAlign: "center", fontSize: 10.5, fontWeight: 700, color: "#B8631A", padding: "6px 2px", fontFamily: "'Space Mono', monospace" }}>{slot.label}</div>)}
        </div>
        {DAYS.map((day, i) => {
          const dateForDay = addDays(weekStart, i); const isToday = toISODate(dateForDay) === todayISO; const isWeekend = i === 0 || i === 6;
          return (
            <div key={day} className="week-day-row" style={{ borderLeft: isToday ? `3px solid ${C.mustard}` : "3px solid transparent", background: isToday ? "linear-gradient(90deg, rgba(255,166,48,0.16), rgba(255,90,26,0.05) 60%)" : "transparent" }}>
              <div className="week-day-col">
                {isToday && <span style={{ position: "absolute", top: 3, right: 3, width: 6, height: 6, borderRadius: "50%", background: "linear-gradient(135deg, #FFC24B, #FF5A1A)" }} />}
                <span style={{ fontFamily: "'Kalam', cursive", fontSize: 14, color: isWeekend ? C.tomato : C.cream, lineHeight: 1 }}>{day}</span>
                <span style={{ fontFamily: "'Space Mono', monospace", fontSize: 9, color: isToday ? C.mustard : C.muted }}>{dateForDay.getDate()}</span>
              </div>
              {SLOTS.map((slot, si) => {
                const rid = plan[day]?.[slot.key]; const recipe = rid ? recipeMap[rid] : null;
                return (
                  <button key={slot.key} onClick={() => onPick(wk, day, slot.key)} className="slot-btn" style={{ borderRight: si < SLOTS.length - 1 ? `1px solid ${C.line}` : "none" }}>
                    {recipe ? (
                      <React.Fragment>
                        <span className="recipe-tag">{recipe.name}</span>
                        <span onClick={(e) => { e.stopPropagation(); onClear(wk, day, slot.key); }} style={{ position: "absolute", top: 1, right: 1, padding: 3, display: "flex" }}><X size={9} color={C.muted} /></span>
                      </React.Fragment>
                    ) : <Plus size={15} color={C.muted} strokeWidth={2.5} />}
                  </button>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// --- AI抽出モジュール群 ---
function PhotoImportModal({ onMerge, onClose }) {
  const [status, setStatus] = useState("idle"); const [errorMsg, setErrorMsg] = useState(""); const [extracted, setExtracted] = useState([]); const [resultCount, setResultCount] = useState(null);
  const handleFile = async (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    setStatus("loading"); setErrorMsg(""); setExtracted([]); setResultCount(null);
    try {
      const base64 = await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result.split(",")[1]); r.onerror = rej; r.readAsDataURL(file); });
      const prompt = "この画像に写っている料理レシピを抽出してJSONのみ出力してください。フォーマット: [{\"name\": \"料理名\", \"ingredients\": [{\"name\": \"材料名\", \"amount\": \"分量\"}]}]";
      const res = await fetch(GEMINI_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: file.type || "image/jpeg", data: base64 } }] }] }) });
      if (!res.ok) throw new Error(`APIエラー (${res.status})`);
      const data = await res.json(); let text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
      const parsed = cleanAndParseJSON(text); setExtracted(parsed.map(r => ({ id: uid(), name: r.name?.trim() || "", ingredients: r.ingredients || [], checked: true }))); setStatus("done");
    } catch (err) { setErrorMsg(err.message || String(err)); setStatus("error"); }
  };
  return (
    <Modal onClose={onClose} title="写真からレシピを追加">
      <p style={{ fontSize: 12, color: C.muted, marginTop: 0 }}>料理本の写真などからAIがレシピを自動抽出します。</p>
      {resultCount === null && <label style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, border: `1px dashed ${C.mustard}`, borderRadius: 10, padding: 16, color: C.mustard, fontWeight: 700, cursor: "pointer", marginBottom: 14 }}>{status === "loading" ? "読み取り中…" : "画像を選ぶ"}<input type="file" accept="image/*" onChange={handleFile} disabled={status === "loading"} style={{ display: "none" }} /></label>}
      {status === "error" && <div style={{ color: C.tomato, fontSize: 13, marginBottom: 12 }}>{errorMsg}</div>}
      {extracted.length > 0 && resultCount === null && (
        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 14 }}>
          {extracted.map(it => (

function ShoppingView({ list, extraItems, checked, onToggle, newExtra, setNewExtra, onAddExtra, onRemoveExtra }) {
  const grouped = useMemo(() => {
    const byName = {};
    list.forEach((item) => { byName[item.name] = { key: item.name, label: item.name, amounts: [...item.amounts], category: item.category || "その他", manualIds: [] }; });
    extraItems.forEach((item) => {
      const name = item.text.trim();
      if (byName[name]) { byName[name].manualIds.push(item.id); }
      else { byName[name] = { key: name, label: name, amounts: [], category: item.category || "その他", manualIds: [item.id] }; }
    });
    const unCh = []; const ch = [];
    Object.values(byName).forEach((entry) => { if (checked[safeCheckKey(entry.key)]) ch.push(entry); else unCh.push(entry); });
    const byCat = {}; unCh.forEach((entry) => { if (!byCat[entry.category]) byCat[entry.category] = []; byCat[entry.category].push(entry); });
    const groups = CATEGORY_ORDER.filter((c) => byCat[c]?.length).map((c) => ({ category: c, items: byCat[c] }));
    return { groups, doneEntries: ch };
  }, [list, extraItems, checked]);

  const allEntries = useMemo(() => [...grouped.groups.flatMap((g) => g.items), ...grouped.doneEntries], [grouped]);
  const total = allEntries.length; const doneCount = grouped.doneEntries.length;
  return (
    <div>
      <div style={{ background: C.panel, border: `1px dashed ${C.line}`, borderRadius: 14, padding: "16px 16px 8px", position: "relative" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 }}>
          <span style={{ fontFamily: "'Kalam', cursive", fontSize: 20, color: C.mustard }}>買い物リスト</span>
          <span style={{ fontFamily: "'Space Mono', monospace", fontSize: 12, color: C.muted }}>{doneCount}/{total}</span>
        </div>
        {total === 0 ? <p style={{ color: C.muted, fontSize: 13, padding: "10px 0 16px" }}>献立表にレシピを割り当てると、材料が自動でここに集まります。</p> : (
          <div style={{ display: "flex", flexDirection: "column" }}>
            {grouped.groups.map((group) => (
              <div key={group.category} style={{ marginBottom: 4 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: C.tomato, letterSpacing: 0.5, padding: "10px 2px 4px", textTransform: "uppercase" }}>{group.category}</div>
                {group.items.map((entry) => <ShoppingRow key={entry.key} checked={false} onToggle={() => onToggle(safeCheckKey(entry.key))} label={entry.label} sub={entry.amounts.join(" + ")} onRemove={entry.manualIds.length ? () => entry.manualIds.forEach(id => onRemoveExtra(id)) : void 0} />)}
              </div>
            ))}
            {grouped.doneEntries.length > 0 && (
              <div style={{ marginBottom: 4 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: C.muted, letterSpacing: 0.5, padding: "10px 2px 4px", textTransform: "uppercase" }}>済み(24時間後に自動で消えます)</div>
                {grouped.doneEntries.map((entry) => <ShoppingRow key={entry.key} checked={true} onToggle={() => onToggle(safeCheckKey(entry.key))} label={entry.label} sub={entry.amounts.join(" + ")} onRemove={entry.manualIds.length ? () => entry.manualIds.forEach(id => onRemoveExtra(id)) : void 0} />)}
              </div>
            )}
          </div>
        )}
        <div style={{ display: "flex", gap: 6, padding: "10px 0 4px" }}>
          <input value={newExtra} onChange={(e) => setNewExtra(e.target.value)} onKeyDown={(e) => e.key === "Enter" && onAddExtra()} placeholder="ほしいものを追加(例: 卵)" style={{ ...inputStyle, background: "rgba(255,255,255,0.03)" }} />
          <button onClick={onAddExtra} style={{ ...primaryBtnStyle, flex: "0 0 44px", padding: 0 }}><Plus size={16} style={{ margin: "0 auto" }} /></button>
        </div>
      </div>
    </div>
  );
}
